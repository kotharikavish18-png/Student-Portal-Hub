<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Student Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .login-prompt {
      text-align: center;
      padding: 64px 24px;
      background: rgba(255,255,255,0.03);
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 24px;
      margin-bottom: 28px;
    }
    .login-prompt .prompt-icon { font-size: 52px; margin-bottom: 16px; }
    .login-prompt h2 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
      color: #fff; margin-bottom: 10px;
    }
    .login-prompt p { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 28px; line-height: 1.7; }
    .login-prompt a {
      display: inline-block; padding: 13px 36px; border-radius: 50px;
      background: linear-gradient(135deg, #4a9eff, #6ec6ff);
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 14px; text-decoration: none;
      box-shadow: 0 6px 20px rgba(74,158,255,0.3);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .login-prompt a:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,158,255,0.4); }
    .profile-hero {
      display: flex; align-items: center; gap: 24px;
      background: linear-gradient(135deg, rgba(74,158,255,0.14), rgba(110,198,255,0.06));
      border: 1.5px solid rgba(74,158,255,0.22);
      border-radius: 24px; padding: 30px 28px; margin-bottom: 24px;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #4a9eff, #6ec6ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(74,158,255,0.35);
    }
    .profile-hero-info .p-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; color: #fff; margin-bottom: 6px; }
    .profile-hero-info .p-detail { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 3px; }
    .profile-hero-info .p-badge {
      display: inline-block; margin-top: 8px; padding: 4px 14px; border-radius: 50px;
      background: rgba(110,231,183,0.12); border: 1px solid rgba(110,231,183,0.25);
      color: #6ee7b7; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .info-row {
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 20px;
    }
    .info-row .ir-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .info-row .ir-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: #fff; }
    .profile-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .edit-section { margin-top: 28px; border-top: 1px solid rgba(255,255,255,0.07); padding-top: 28px; }
    .edit-section h3 { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 18px; }
  </style>
</head>
<body class="page-body">

  <header class="page-topbar">
    <a href="index.html" class="back-btn">← Back</a>
    <span class="page-title">Profile</span>
    <nav class="topbar-nav">
      <a href="index.html" class="nav-btn nav-btn-home">🏠 Home</a>
      <a href="loginpage.html" class="nav-btn nav-btn-login" id="navLoginBtn">Login</a>
    </nav>
  </header>

  <main class="page-content">

    <!-- NOT LOGGED IN -->
    <div class="login-prompt" id="loginPrompt" style="display:none;">
      <div class="prompt-icon">🔒</div>
      <h2>You're not logged in</h2>
      <p>Please login or create an account to view<br/>your profile and save your data.</p>
      <a href="loginpage.html">Login / Sign Up →</a>
    </div>

    <!-- LOGGED IN -->
    <div id="profileView" style="display:none;">
      <div class="profile-hero">
        <div class="profile-avatar">👤</div>
        <div class="profile-hero-info">
          <div class="p-name" id="displayName">—</div>
          <div class="p-detail" id="displayEmail">—</div>
          <div class="p-detail" id="displayCourse">—</div>
          <span class="p-badge">✔ Logged In</span>
        </div>
      </div>
      <div class="profile-info-grid">
        <div class="info-row"><div class="ir-label">Full Name</div><div class="ir-value" id="infoName">—</div></div>
        <div class="info-row"><div class="ir-label">Email</div><div class="ir-value" id="infoEmail">—</div></div>
        <div class="info-row"><div class="ir-label">Course / Branch</div><div class="ir-value" id="infoCourse">—</div></div>
        <div class="info-row"><div class="ir-label">Member Since</div><div class="ir-value" id="infoSince">—</div></div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-ghost" onclick="toggleEdit()">✏ Edit Details</button>
        <button class="btn btn-danger" onclick="logoutUser()">🚪 Log Out</button>
      </div>
      <div class="edit-section" id="editSection" style="display:none;">
        <h3>Update Profile</h3>
        <form id="profileForm">
          <div class="form-group"><label>Full Name</label><input type="text" id="editName" placeholder="Your full name"/></div>
          <div class="form-group"><label>Email Address</label><input type="email" id="editEmail" placeholder="your@email.com"/></div>
          <div class="form-group"><label>Course / Branch</label><input type="text" id="editCourse" placeholder="e.g. B.Tech Computer Science"/></div>
          <div style="display:flex;gap:12px;">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <button type="button" class="btn btn-ghost" onclick="toggleEdit()">Cancel</button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <script src="js/script.js"></script>
  <script>
    function loadProfilePage() {
      const user   = JSON.parse(localStorage.getItem('authUser') || 'null');
      const navBtn = document.getElementById('navLoginBtn');
      if (!user) {
        document.getElementById('loginPrompt').style.display = 'block';
        document.getElementById('profileView').style.display = 'none';
        return;
      }
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('profileView').style.display = 'block';
      const since = (JSON.parse(localStorage.getItem('profile') || '{}')).saved || 'N/A';
      document.getElementById('displayName').textContent  = user.name;
      document.getElementById('displayEmail').textContent = user.email;
      document.getElementById('displayCourse').textContent = '📚 ' + user.course;
      document.getElementById('infoName').textContent    = user.name;
      document.getElementById('infoEmail').textContent   = user.email;
      document.getElementById('infoCourse').textContent  = user.course;
      document.getElementById('infoSince').textContent   = since;
      document.getElementById('editName').value   = user.name;
      document.getElementById('editEmail').value  = user.email;
      document.getElementById('editCourse').value = user.course;
      if (navBtn) { navBtn.textContent = '👤 ' + user.name.split(' ')[0]; navBtn.href = 'profile.html'; }
    }
    function toggleEdit() {
      const sec = document.getElementById('editSection');
      sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    }
    function logoutUser() {
      if (!confirm('Log out of Student Hub?')) return;
      localStorage.removeItem('authUser');
      localStorage.removeItem('profile');
      window.location.href = 'loginpage.html';
    }
    document.addEventListener('DOMContentLoaded', function() {
      loadProfilePage();
      const form = document.getElementById('profileForm');
      if (!form) return;
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const name   = document.getElementById('editName').value.trim();
        const email  = document.getElementById('editEmail').value.trim();
        const course = document.getElementById('editCourse').value.trim();
        if (!name || !email || !course) { showToast('Fill all fields', '#ff6eb4'); return; }
        const user = JSON.parse(localStorage.getItem('authUser') || '{}');
        user.name = name; user.email = email; user.course = course;
        localStorage.setItem('authUser', JSON.stringify(user));
        localStorage.setItem('profile', JSON.stringify({ name, email, course, saved: new Date().toLocaleDateString() }));
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const idx   = users.findIndex(u => u.email === email);
        if (idx > -1) { users[idx].name = name; users[idx].course = course; localStorage.setItem('users', JSON.stringify(users)); }
        showToast('Profile updated!');
        toggleEdit();
        loadProfilePage();
      });
    });
  </script>
</body>
</html>
