<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — Student Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="page-body">

  <header class="page-topbar">
    <a href="index.html" class="back-btn">← Back</a>
    <span class="page-title">Projects</span>
      <nav class="topbar-nav" id="pageNav"></nav>
  </header>

  <main class="page-content">

    <div class="info-card">
      <h3>Add Project</h3>
      <form id="projectForm">
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" name="projName" placeholder="e.g. Library Management System" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="projDesc" placeholder="Brief description of your project..."></textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="projStatus">
            <option value="Planning">📋 Planning</option>
            <option value="In Progress">🔧 In Progress</option>
            <option value="Completed">✅ Completed</option>
            <option value="On Hold">⏸ On Hold</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">🚀 Add Project</button>
      </form>
    </div>

    <div class="divider"></div>

    <div class="section-header">
      <h2>🚀 My Projects</h2>
    </div>

    <div id="projectList"></div>

  </main>

  <script src="js/script.js"></script>
  <script>
    (function() {
      const user   = JSON.parse(localStorage.getItem('authUser') || 'null');
      const nav    = document.getElementById('pageNav');
      if (!nav) return;
      const homeBtn  = '<a href="index.html" class="nav-btn nav-btn-home">🏠 Home</a>';
      const loginBtn = user
        ? '<a href="profile.html" class="nav-btn nav-btn-login">👤 ' + user.name.split(' ')[0] + '</a>'
        : '<a href="loginpage.html" class="nav-btn nav-btn-login">Login</a>';
      nav.innerHTML = homeBtn + loginBtn;
    })();
  </script>
</body>
</html>
