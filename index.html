<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Hub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="dashboard-body">

  <header class="topbar">
    <div class="logo">
      <span class="logo-icon">📘</span>
      <span class="logo-text">Student Hub</span>
    </div>
    <nav class="topbar-nav">
      <a href="index.html" class="nav-btn nav-btn-home">🏠 Home</a>
      <a href="loginpage.html" class="nav-btn nav-btn-login" id="navLoginBtn">Login</a>
    </nav>
  </header>

  <main class="dashboard-grid">

    <!-- Row 1: PROFILE -->
    <a href="profile.html" class="card card-white" style="grid-column:1; grid-row:1;">
      <span class="card-title">PROFILE</span>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 1: TIME TABLE -->
    <a href="timetable.html" class="card card-pink" style="grid-column:2; grid-row:1;">
      <span class="card-title">TIME TABLE</span>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 1: TASKS (spans 2 columns) -->
    <a href="tasks.html" class="card card-pink" style="grid-column:3/span 2; grid-row:1;">
      <span class="card-title">TASKS</span>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 2: NOTES -->
    <a href="notes.html" class="card card-blue" style="grid-column:1; grid-row:2;">
      <span class="card-title">NOTES</span>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 2: MONEY BALANCE -->
    <a href="money.html" class="card card-blue" style="grid-column:2; grid-row:2;">
      <span class="card-title">MONEY BALANCE</span>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 2: STUDY TIMER — tall vertical (spans 2 rows) -->
    <a href="timer.html" class="card card-blue" style="grid-column:3; grid-row:2/span 2;">
      <span class="card-title">STUDY TIMER</span>
      <div class="card-inner-box"></div>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 2: SYLLABUS — tall vertical (spans 2 rows) -->
    <a href="syllabus.html" class="card card-pink" style="grid-column:4; grid-row:2/span 2;">
      <span class="card-title">SYLLABUS</span>
      <div class="card-inner-box"></div>
      <div class="card-arrow">→</div>
    </a>

    <!-- Row 3: PROJECTS — tall vertical (spans 2 columns) -->
    <a href="projects.html" class="card card-pink" style="grid-column:1/span 2; grid-row:3;">
      <span class="card-title">PROJECTS</span>
      <div class="card-arrow">→</div>
    </a>

  </main>

  <script src="js/script.js"></script>
  <script>
    (function() {
      const user   = JSON.parse(localStorage.getItem('authUser') || 'null');
      const navBtn = document.getElementById('navLoginBtn');

      if (user && navBtn) {
        navBtn.textContent = '👤 ' + user.name.split(' ')[0];
        navBtn.href = 'profile.html';
      }

      // If NOT logged in, mark protected cards with a lock indicator
      if (!user) {
        const PROTECTED = ['timetable.html','tasks.html','notes.html',
                           'money.html','timer.html','syllabus.html','projects.html'];
        document.querySelectorAll('.card').forEach(function(card) {
          const href = card.getAttribute('href') || '';
          const page = href.split('/').pop();
          if (PROTECTED.includes(page)) {
           
            const lock = document.createElement('div');
            lock.className = 'card-lock';
            lock.textContent = '🔒';
            card.appendChild(lock);
            
            card.addEventListener('click', function(e) {
              e.preventDefault();
              window.location.href = 'loginpage.html';
            });
          }
        });
      }
    })();
  </script>
</body>
</html>
